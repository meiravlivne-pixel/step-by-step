<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>צועדת</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- אזור התוכן הראשי של האפליקציה -->
    <main id="app-container">
        
        <!-- מסך 1: היום -->
        <section id="screen-today" class="app-screen active">
            <header class="screen-header">
                <button class="icon-btn">🔔</button>
                <h1>היום</h1>
                <button class="icon-btn">⚙️</button>
            </header>
            <div class="screen-content">
                <div class="welcome-box">
                    <h2>היי מירב 👋</h2>
                    <p>איך את רוצה להתקדם היום?</p>
                </div>
                <!-- כאן ייכנס כרטיס המחזור הפעיל וכפתור ה-Check-in -->
            </div>
        </section>

        <!-- מסך 2: התוכנית שלי -->
        <section id="screen-program" class="app-screen">
            <header class="screen-header">
                <h1>התוכנית שלי</h1>
            </header>
            <div class="screen-content">
                <p>כאן תופיע התוכנית המלאה של המחזור הנוכחי.</p>
            </div>
        </section>

        <!-- מסך 3: הדרך שלי -->
        <section id="screen-journey" class="app-screen">
            <header class="screen-header">
                <h1>הדרך שלי</h1>
            </header>
            <div class="screen-content">
                <p>כאן יופיעו השינויים שהושגו, הצלחות מצטברות ותובנות.</p>
            </div>
        </section>

        <!-- מסך 4: עוד / הגדרות -->
        <section id="screen-more" class="app-screen">
            <header class="screen-header">
                <h1>עוד</h1>
            </header>
            <div class="screen-content">
                <p>אפשרויות נוספות, סקירת סוף מחזור והגדרות.</p>
            </div>
        </section>

    </main>

    <!-- שורת ניווט תחתונה -->
    <nav id="bottom-nav">
        <button class="nav-item active" data-screen="screen-today">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">היום</span>
        </button>
        <button class="nav-item" data-screen="screen-program">
            <span class="nav-icon">📋</span>
            <span class="nav-label">התוכנית שלי</span>
        </button>
        <button class="nav-item" data-screen="screen-journey">
            <span class="nav-icon">📈</span>
            <span class="nav-label">הדרך שלי</span>
        </button>
        <button class="nav-item" data-screen="screen-more">
            <span class="nav-icon">•••</span>
            <span class="nav-label">עוד</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
